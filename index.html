<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 연차 관리 시스템 (LeavePass)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 로딩 스피너 -->
    <div id="loading" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
            <p class="text-white font-bold">서버와 통신 중...</p>
        </div>
    </div>

    <!-- 알림 메시지 -->
    <div id="alert-container" class="fixed top-4 right-4 z-[60] space-y-2"></div>

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- 인증 섹션 -->
        <div id="auth-section" class="max-w-md mx-auto mt-10">
            <div class="glass-morphism p-8 rounded-3xl shadow-2xl border border-white">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-blue-600 tracking-tighter">LeavePass</h1>
                    <p class="text-slate-500 mt-2 font-medium" id="auth-subtitle">연차 관리 시스템</p>
                </div>

                <!-- 로그인 폼 -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 ml-1">아이디 (ID)</label>
                        <input type="text" id="login-id" required class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 ml-1">비밀번호</label>
                        <input type="password" id="login-pw" required class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 mt-2">로그인</button>
                    <p class="text-center text-sm text-slate-500 mt-6">
                        계정이 없으신가요? <a href="#" onclick="toggleAuthMode(true)" class="text-blue-600 font-black hover:underline">회원가입</a>
                    </p>
                </form>

                <!-- 회원가입 폼 -->
                <form id="register-form" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 ml-1">이름</label>
                            <input type="text" id="reg-name" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 ml-1">생년월일</label>
                            <input type="date" id="reg-birth" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 ml-1">휴대폰 번호</label>
                        <input type="tel" id="reg-phone" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="010-0000-0000">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 ml-1">입사일</label>
                        <input type="date" id="reg-join" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 ml-1">아이디 (ID)</label>
                            <input type="text" id="reg-id" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 ml-1">비밀번호</label>
                            <input type="password" id="reg-pw" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 ml-1">권한</label>
                        <select id="reg-role" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-sm">
                            <option value="user">일반 사원</option>
                            <option value="admin">관리자</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 mt-2">가입 신청</button>
                    <p class="text-center text-sm text-slate-500 mt-6">
                        이미 계정이 있나요? <a href="#" onclick="toggleAuthMode(false)" class="text-blue-600 font-black hover:underline">로그인</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div id="main-section" class="hidden animate-in fade-in duration-500">
            <nav class="flex justify-between items-center mb-8 glass-morphism p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg">
                        <i class="fas fa-calendar-check text-lg"></i>
                    </div>
                    <span class="text-2xl font-black text-slate-800 tracking-tighter">LeavePass</span>
                    <span id="user-badge" class="ml-2 px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black rounded-full uppercase border border-blue-200">USER</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="welcome-msg" class="text-slate-700 font-bold hidden md:block"></span>
                    <button onclick="logout()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </button>
                </div>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 사이드바 -->
                <div class="space-y-6">
                    <div class="glass-morphism p-8 rounded-3xl shadow-sm border border-white border-l-8 border-l-blue-500">
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">잔여 연차</p>
                        <div class="flex items-baseline gap-2 mt-2">
                            <h2 id="remaining-leave" class="text-5xl font-black text-slate-800">0</h2>
                            <span class="text-slate-400 font-bold text-lg">/ <span id="total-leave">15</span>일</span>
                        </div>
                    </div>

                    <div id="user-request-card" class="glass-morphism p-6 rounded-3xl shadow-sm border border-white">
                        <h3 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                            <i class="fas fa-paper-plane text-blue-500"></i> 연차 신청
                        </h3>
                        <form id="leave-request-form" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs font-bold text-slate-500 ml-1">시작일</label>
                                    <input type="date" id="leave-start" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-500 ml-1">종료일</label>
                                    <input type="date" id="leave-end" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 ml-1">종류</label>
                                <select id="leave-type" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                                    <option value="연차">일반 연차</option>
                                    <option value="반차">반차</option>
                                    <option value="병가">병가</option>
                                    <option value="경조사">경조사</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black hover:bg-black transition-all shadow-xl mt-2">신청하기</button>
                        </form>
                    </div>
                </div>

                <!-- 메인 내역 -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="user-history" class="glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                            <h3 class="text-lg font-black text-slate-800">연차 현황 및 내역</h3>
                            <button onclick="refreshData()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black hover:bg-blue-100 transition-all">
                                <i class="fas fa-sync-alt mr-1"></i> 새로고침
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-slate-50/80">
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">신청 기간</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">구분</th>
                                        <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">진행 상태</th>
                                    </tr>
                                </thead>
                                <tbody id="history-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="admin-panel" class="hidden glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-white/50 font-black text-lg text-slate-800">관리자 승인 센터</div>
                        <div id="admin-queue-body" class="divide-y divide-slate-100"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 설정 ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbysUniOS_hutrMB3zpgyR2wWeT4L7Z0aj9zOxsWNpR-nV-EZtnBsiWMedZoWFqxlUTGCw/exec"; 

        let state = { currentUser: null, requests: [] };

        // --- UI 함수 ---
        function showAlert(msg, type = 'info') {
            const container = document.getElementById('alert-container');
            const div = document.createElement('div');
            const colors = { info: 'bg-blue-600', success: 'bg-emerald-600', error: 'bg-red-600' };
            div.className = `${colors[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-right duration-300 font-bold text-sm`;
            div.innerHTML = `<span>${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => {
                div.classList.add('animate-out', 'fade-out', 'duration-500');
                setTimeout(() => div.remove(), 500);
            }, 4000);
        }

        function toggleLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
        function toggleAuthMode(isRegister) {
            document.getElementById('login-form').classList.toggle('hidden', isRegister);
            document.getElementById('register-form').classList.toggle('hidden', !isRegister);
        }

        // --- 통신 함수 ---
        async function apiCall(action, data = {}) {
            toggleLoading(true);
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // CORS 이슈 해결을 위한 설정 (하지만 JSON 응답을 못받을 수 있음)
                    body: JSON.stringify({ action, ...data })
                });

                // GAS의 특성상 no-cors 모드에서는 응답 본문을 읽을 수 없으므로 
                // 실제 배포 시에는 GAS 주소에 대해 표준 fetch를 사용하고, GAS에서 적절한 Header를 설정해야 합니다.
                // 아래는 표준 통신 방식입니다.
                const standardResponse = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, ...data })
                });
                
                const result = await standardResponse.json();
                if (result.status === 'error') throw new Error(result.message);
                return result;
            } catch (err) {
                console.error(err);
                showAlert(`통신 오류: ${err.message}. GAS 배포 설정(모든 사용자)을 확인하세요.`, 'error');
                return null;
            } finally { toggleLoading(false); }
        }

        // --- 인증/데이터 로직 ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await apiCall('login', { id: document.getElementById('login-id').value, pw: document.getElementById('login-pw').value });
            if (res && res.user) loginSuccess(res.user, res.requests);
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                birth: document.getElementById('reg-birth').value,
                phone: document.getElementById('reg-phone').value,
                joinDate: document.getElementById('reg-join').value,
                id: document.getElementById('reg-id').value,
                pw: document.getElementById('reg-pw').value,
                role: document.getElementById('reg-role').value
            };
            const res = await apiCall('register', data);
            if (res) { showAlert('회원가입 완료! 로그인 해주세요.', 'success'); toggleAuthMode(false); }
        };

        function loginSuccess(user, requests = []) {
            state.currentUser = user;
            state.requests = requests;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `${user.name} 님`;
            document.getElementById('user-badge').innerText = user.role.toUpperCase();
            
            const isAdmin = user.role === 'admin';
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            document.getElementById('user-request-card').classList.toggle('hidden', isAdmin);
            document.getElementById('user-history').classList.toggle('hidden', isAdmin);
            
            renderDashboard();
            showAlert(`${user.name}님 환영합니다!`, 'success');
        }

        document.getElementById('leave-request-form').onsubmit = async (e) => {
            e.preventDefault();
            const start = document.getElementById('leave-start').value;
            const end = document.getElementById('leave-end').value;
            if (new Date(start) > new Date(end)) return showAlert('기간 설정이 올바르지 않습니다.', 'error');
            
            const res = await apiCall('requestLeave', {
                userId: state.currentUser.id, userName: state.currentUser.name,
                start, end, type: document.getElementById('leave-type').value
            });
            if (res) { showAlert('연차 신청서가 전송되었습니다.', 'success'); refreshData(); }
        };

        async function refreshData() {
            if (!state.currentUser) return;
            const res = await apiCall('fetchData', { id: state.currentUser.id, role: state.currentUser.role });
            if (res) { state.currentUser = res.user; state.requests = res.requests; renderDashboard(); }
        }

        async function updateStatus(reqId, status) {
            const res = await apiCall('updateStatus', { requestId: reqId, status });
            if (res) { showAlert(`${status} 처리되었습니다.`); refreshData(); }
        }

        function renderDashboard() {
            const u = state.currentUser;
            document.getElementById('total-leave').innerText = u.total;
            document.getElementById('remaining-leave').innerText = (u.total - u.used).toFixed(1);

            const hist = document.getElementById('history-body');
            hist.innerHTML = state.requests.length ? '' : '<tr><td colspan="3" class="p-10 text-center text-slate-300 font-black">내역이 없습니다.</td></tr>';
            state.requests.forEach(req => {
                if (u.role === 'user' && req.userId !== u.id) return;
                const color = req.status === '승인' ? 'bg-emerald-100 text-emerald-600' : (req.status === '반려' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600');
                hist.innerHTML += `<tr class="hover:bg-slate-50 transition-all"><td class="p-5 font-bold text-slate-700 text-sm">${req.start} ~ ${req.end}</td><td class="p-5 text-xs font-black text-slate-400">${req.type}</td><td class="p-5 text-right"><span class="px-3 py-1.5 rounded-full text-[10px] font-black ${color}">${req.status}</span></td></tr>`;
            });

            if (u.role === 'admin') {
                const adminBody = document.getElementById('admin-queue-body');
                const pending = state.requests.filter(r => r.status === '대기');
                adminBody.innerHTML = pending.length ? '' : '<div class="p-16 text-center text-slate-300 font-black">대기 중인 신청이 없습니다.</div>';
                pending.forEach(req => {
                    adminBody.innerHTML += `<div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 hover:bg-slate-50"><div><div class="flex items-center gap-2"><span class="font-black text-slate-800">${req.userName}</span><span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-md font-black">${req.type}</span></div><div class="text-xs text-slate-500 mt-1 font-bold">${req.start} ~ ${req.end}</div></div><div class="flex gap-2 w-full md:w-auto"><button onclick="updateStatus('${req.id}', '승인')" class="flex-1 md:flex-none px-5 py-2.5 bg-emerald-500 text-white rounded-xl font-black text-xs hover:bg-emerald-600 shadow-lg">승인</button><button onclick="updateStatus('${req.id}', '반려')" class="flex-1 md:flex-none px-5 py-2.5 bg-rose-500 text-white rounded-xl font-black text-xs hover:bg-rose-600 shadow-lg">반려</button></div></div>`;
                });
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
