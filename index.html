<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 연차 관리 시스템 (LeavePass)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-morphism { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .input-field { 
            @apply w-full mt-1 p-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium; 
        }
        .label-text { 
            @apply block text-xs font-bold text-slate-600 ml-1 mb-1; 
        }
        input::placeholder { color: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 로딩 스피너 -->
    <div id="loading" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
            <p class="text-white font-bold text-sm">데이터를 처리 중입니다...</p>
        </div>
    </div>

    <!-- 회원가입 성공 커스텀 팝업 (모달) -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">가입 완료!</h3>
            <p class="text-slate-500 font-medium mb-8">이제 아이디로 로그인하여<br>연차 관리를 시작하세요.</p>
            <button onclick="closeSuccessModal()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black hover:bg-black transition-all">로그인하러 가기</button>
        </div>
    </div>

    <!-- 알림 컨테이너 -->
    <div id="alert-container" class="fixed top-4 right-4 z-[60] space-y-2"></div>

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- 인증 섹션 (로그인/회원가입) -->
        <div id="auth-section" class="max-w-md mx-auto mt-10">
            <div class="glass-morphism p-8 rounded-3xl shadow-2xl border border-white">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-blue-600 tracking-tighter">LeavePass</h1>
                    <p class="text-slate-500 mt-2 font-medium">연차 관리 시스템</p>
                </div>

                <!-- 로그인 폼 -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="label-text">아이디 (ID)</label>
                        <input type="text" id="login-id" required class="input-field" placeholder="아이디를 입력하세요">
                    </div>
                    <div>
                        <label class="label-text">비밀번호</label>
                        <input type="password" id="login-pw" required class="input-field" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg mt-2">로그인</button>
                    <p class="text-center text-sm text-slate-500 mt-6 font-medium">
                        계정이 없으신가요? <a href="#" onclick="toggleAuthMode(true)" class="text-blue-600 font-black hover:underline cursor-pointer">회원가입</a>
                    </p>
                </form>

                <!-- 회원가입 폼 -->
                <form id="register-form" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">이름</label>
                            <input type="text" id="reg-name" required maxlength="3" class="input-field" placeholder="3자 이내">
                        </div>
                        <div>
                            <label class="label-text">생년월일</label>
                            <input type="text" id="reg-birth" required maxlength="10" class="input-field" placeholder="1990-01-01" oninput="autoHyphenDate(this)">
                        </div>
                    </div>
                    
                    <div>
                        <label class="label-text">휴대폰 번호</label>
                        <input type="tel" id="reg-phone" required maxlength="13" class="input-field" placeholder="010-0000-0000" oninput="autoHyphenPhone(this)">
                    </div>

                    <div>
                        <label class="label-text">입사일</label>
                        <input type="text" id="reg-join" required maxlength="10" class="input-field" placeholder="2024-01-01" oninput="autoHyphenDate(this)">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">아이디 (ID)</label>
                            <input type="text" id="reg-id" required class="input-field" placeholder="사용할 ID">
                        </div>
                        <div>
                            <label class="label-text">비밀번호</label>
                            <input type="password" id="reg-pw" required class="input-field" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black hover:bg-emerald-700 transition-all shadow-lg mt-2">가입 완료</button>
                    <p class="text-center text-sm text-slate-500 mt-6 font-medium">
                        이미 계정이 있나요? <a href="#" onclick="toggleAuthMode(false)" class="text-blue-600 font-black hover:underline cursor-pointer">로그인</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- 메인 섹션 -->
        <div id="main-section" class="hidden animate-in fade-in duration-500">
            <nav class="flex justify-between items-center mb-8 glass-morphism p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg">
                        <i class="fas fa-calendar-check text-lg"></i>
                    </div>
                    <span class="text-2xl font-black text-slate-800 tracking-tighter">LeavePass</span>
                    <span id="user-badge" class="ml-2 px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black rounded-full uppercase border border-blue-200">USER</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="welcome-msg" class="text-slate-700 font-bold hidden md:block"></span>
                    <button onclick="logout()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </button>
                </div>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 통계 정보 -->
                <div class="space-y-6">
                    <div class="glass-morphism p-8 rounded-3xl shadow-sm border border-white border-l-8 border-l-blue-500">
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">잔여 연차</p>
                        <div class="flex items-baseline gap-2 mt-2">
                            <h2 id="remaining-leave" class="text-5xl font-black text-slate-800">0</h2>
                            <span class="text-slate-400 font-bold text-lg">/ <span id="total-leave">15</span>일</span>
                        </div>
                    </div>

                    <!-- 신청 폼 -->
                    <div id="user-request-card" class="glass-morphism p-6 rounded-3xl shadow-sm border border-white">
                        <h3 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                            <i class="fas fa-paper-plane text-blue-500"></i> 연차 신청
                        </h3>
                        <form id="leave-request-form" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="label-text">시작일</label>
                                    <input type="date" id="leave-start" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label class="label-text">종료일</label>
                                    <input type="date" id="leave-end" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                            <div>
                                <label class="label-text">유형</label>
                                <select id="leave-type" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="연차">일반 연차</option>
                                    <option value="반차">반차</option>
                                    <option value="병가">병가</option>
                                    <option value="경조사">경조사</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black hover:bg-black transition-all shadow-xl mt-2">신청하기</button>
                        </form>
                    </div>
                </div>

                <!-- 히스토리 목록 -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="user-history" class="glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                            <h3 class="text-lg font-black text-slate-800">연차 내역</h3>
                            <button onclick="refreshData()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black hover:bg-blue-100 transition-all">
                                <i class="fas fa-sync-alt mr-1"></i> 새로고침
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-slate-50/80">
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">기간</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">유형</th>
                                        <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">상태</th>
                                    </tr>
                                </thead>
                                <tbody id="history-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 관리자 패널 -->
                    <div id="admin-panel" class="hidden glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-white/50 font-black text-lg text-slate-800">승인 관리 데스크</div>
                        <div id="admin-queue-body" class="divide-y divide-slate-100"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 새로운 배포 URL 적용
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4RU4q3Jc9XStADnW7FYwBw5t1R4R6lAbG2_sRttI7VcBD9vaGFEH1DC0Rj8MMIq0F6g/exec"; 

        let state = { currentUser: null, requests: [] };

        // --- 자동 하이픈 생성 로직 ---
        function autoHyphenPhone(target) {
            target.value = target.value
                .replace(/[^0-9]/g, '')
                .replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3").replace(/\-{1,2}$/g, "");
        }

        function autoHyphenDate(target) {
            target.value = target.value
                .replace(/[^0-9]/g, '')
                .replace(/^(\d{0,4})(\d{0,2})(\d{0,2})$/g, "$1-$2-$3").replace(/\-{1,2}$/g, "");
        }

        // --- 날짜 포맷 변환 (ISO -> YYYY-MM-DD) ---
        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; // 파싱 실패시 원본 반환
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function showAlert(msg, type = 'info') {
            const container = document.getElementById('alert-container');
            const div = document.createElement('div');
            const colors = { info: 'bg-blue-600', success: 'bg-emerald-600', error: 'bg-red-600' };
            div.className = `${colors[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-in font-bold text-sm`;
            div.innerHTML = `<span>${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        // 가입 성공 모달 관련
        function showSuccessModal() {
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function closeSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
            toggleAuthMode(false); // 모달 닫으면 로그인 창으로 전환
        }

        function toggleLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
        function toggleAuthMode(isRegister) {
            document.getElementById('login-form').classList.toggle('hidden', isRegister);
            document.getElementById('register-form').classList.toggle('hidden', !isRegister);
        }

        // --- API 호출 (개선된 버전) ---
        async function apiCall(action, data = {}) {
            toggleLoading(true);
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ action, ...data })
                });

                if (!response.ok) throw new Error(`HTTP 에러: ${response.status}`);
                
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                return result;
            } catch (err) {
                console.error("통신 오류 상세:", err);
                let errorMsg = err.message;
                if (err.message === 'Failed to fetch') {
                    errorMsg = "서버 응답 없음 (CORS/배포 권한 확인 필요). 깃허브 배포 주소에서 직접 테스트해 보세요.";
                }
                showAlert(`서버 오류: ${errorMsg}`, 'error');
                return null;
            } finally { toggleLoading(false); }
        }

        // --- 새로고침 시 세션 유지 로직 ---
        window.addEventListener('DOMContentLoaded', async () => {
            const savedUserStr = sessionStorage.getItem('leavepass_user');
            if (savedUserStr) {
                try {
                    const savedUser = JSON.parse(savedUserStr);
                    // 세션의 유저 정보를 바탕으로 최신 데이터 로드
                    const res = await apiCall('fetchData', { id: savedUser.id, role: savedUser.role });
                    if (res && res.user) {
                        loginSuccess(res.user, res.requests, false); // false = 알림 메시지 생략
                    } else {
                        sessionStorage.removeItem('leavepass_user');
                    }
                } catch(e) {
                    sessionStorage.removeItem('leavepass_user');
                }
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const res = await apiCall('login', { id, pw });
            if (res && res.user) loginSuccess(res.user, res.requests, true);
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await apiCall('register', {
                name: document.getElementById('reg-name').value,
                birth: document.getElementById('reg-birth').value,
                phone: document.getElementById('reg-phone').value,
                joinDate: document.getElementById('reg-join').value,
                id: document.getElementById('reg-id').value,
                pw: document.getElementById('reg-pw').value,
                role: 'user'
            });
            if (res) {
                // 기존의 showAlert 대신 디자인된 모달 띄우기
                showSuccessModal(); 
            }
        };

        function loginSuccess(user, requests = [], showWelcomeMsg = true) {
            state.currentUser = user;
            state.requests = requests;
            
            // 세션 스토리지에 로그인 정보 저장
            sessionStorage.setItem('leavepass_user', JSON.stringify(user));

            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `${user.name} 님`;
            document.getElementById('user-badge').innerText = user.role.toUpperCase();
            const isAdmin = user.role === 'admin';
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            document.getElementById('user-request-card').classList.toggle('hidden', isAdmin);
            document.getElementById('user-history').classList.toggle('hidden', isAdmin);
            renderDashboard();

            if (showWelcomeMsg) {
                showAlert(`${user.name}님 환영합니다!`, 'success');
            }
        }

        document.getElementById('leave-request-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await apiCall('requestLeave', {
                userId: state.currentUser.id, userName: state.currentUser.name,
                start: document.getElementById('leave-start').value,
                end: document.getElementById('leave-end').value,
                type: document.getElementById('leave-type').value
            });
            if (res) { showAlert('신청이 완료되었습니다.', 'success'); refreshData(); }
        };

        async function refreshData() {
            const res = await apiCall('fetchData', { id: state.currentUser.id, role: state.currentUser.role });
            if (res) { state.currentUser = res.user; state.requests = res.requests; renderDashboard(); }
        }

        async function updateStatus(reqId, status) {
            const res = await apiCall('updateStatus', { requestId: reqId, status });
            if (res) { showAlert(`처리되었습니다: ${status}`); refreshData(); }
        }

        function renderDashboard() {
            const u = state.currentUser;
            if(!u) return;
            document.getElementById('total-leave').innerText = u.total;
            document.getElementById('remaining-leave').innerText = (u.total - (u.used || 0)).toFixed(1);
            
            const hist = document.getElementById('history-body'); 
            hist.innerHTML = '';
            
            state.requests.forEach(req => {
                if (u.role === 'user' && req.userId !== u.id) return;
                const color = req.status === '승인' ? 'bg-emerald-100 text-emerald-600' : (req.status === '반려' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600');
                
                // 날짜 포맷 적용 (YYYY-MM-DD)
                const formattedStart = formatDate(req.start);
                const formattedEnd = formatDate(req.end);

                hist.innerHTML += `<tr class="hover:bg-slate-50 transition-all font-medium"><td class="p-5 text-slate-700 text-[13px] tracking-tight">${formattedStart} ~ ${formattedEnd}</td><td class="p-5 text-xs font-black text-slate-400">${req.type}</td><td class="p-5 text-right"><span class="px-3 py-1.5 rounded-full text-[10px] font-black ${color}">${req.status}</span></td></tr>`;
            });
            
            if (u.role === 'admin') {
                const adminBody = document.getElementById('admin-queue-body'); 
                adminBody.innerHTML = '';
                state.requests.filter(r => r.status === '대기').forEach(req => {
                    
                    // 관리자 센터 날짜 포맷 적용
                    const formattedStart = formatDate(req.start);
                    const formattedEnd = formatDate(req.end);

                    adminBody.innerHTML += `<div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 hover:bg-slate-50 transition-all border-b border-slate-50"><div><div class="flex items-center gap-2"><span class="font-black text-slate-800">${req.userName}</span><span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-md font-black">${req.type}</span></div><div class="text-xs text-slate-500 mt-1 font-bold">${formattedStart} ~ ${formattedEnd}</div></div><div class="flex gap-2"><button onclick="updateStatus('${req.id}', '승인')" class="px-4 py-2 bg-emerald-500 text-white rounded-xl font-black text-xs shadow-lg">승인</button><button onclick="updateStatus('${req.id}', '반려')" class="px-4 py-2 bg-rose-500 text-white rounded-xl font-black text-xs shadow-lg">반려</button></div></div>`;
                });
            }
        }

        function logout() { 
            sessionStorage.removeItem('leavepass_user'); // 로그아웃 시 세션 초기화
            location.reload(); 
        }
    </script>
</body>
</html>
