<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 연차 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-morphism { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .input-field { 
            @apply w-full mt-1 p-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium; 
        }
        .label-text { 
            @apply block text-xs font-bold text-slate-600 ml-1 mb-1; 
        }
        input::placeholder { color: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 로딩 스피너 (초기 데이터 불러올 때만 사용) -->
    <div id="loading" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
            <p class="text-white font-bold text-sm">데이터를 처리 중입니다...</p>
        </div>
    </div>

    <!-- 회원가입 성공 커스텀 팝업 (모달) -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">가입 완료!</h3>
            <p class="text-slate-500 font-medium mb-8">이제 아이디로 로그인하여<br>연차 관리를 시작하세요.</p>
            <button onclick="closeSuccessModal()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black hover:bg-black transition-all">로그인하러 가기</button>
        </div>
    </div>

    <!-- 삭제 확인 커스텀 팝업 (모달) -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fas fa-trash-alt"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">정말 삭제할까요?</h3>
            <p class="text-slate-500 font-medium mb-8">해당 연차 내역이 영구적으로 삭제됩니다.<br>(승인건 삭제 시 연차 일수 자동 복구)</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-600 p-4 rounded-2xl font-black hover:bg-slate-200 transition-all">취소</button>
                <button id="confirm-delete-btn" class="flex-1 bg-rose-500 text-white p-4 rounded-2xl font-black hover:bg-rose-600 transition-all">삭제하기</button>
            </div>
        </div>
    </div>

    <!-- 알림 컨테이너 -->
    <div id="alert-container" class="fixed top-4 right-4 z-[60] space-y-2"></div>

    <div id="app" class="max-w-7xl mx-auto px-4 py-8">
        <!-- 인증 섹션 -->
        <div id="auth-section" class="max-w-md mx-auto mt-10 hidden">
            <div class="glass-morphism p-8 rounded-3xl shadow-2xl border border-white">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-blue-600 tracking-tighter">서울더리본치과</h1>
                    <p class="text-slate-500 mt-2 font-medium">연차 관리 시스템</p>
                </div>

                <!-- 로그인 폼 (가로 정렬 교정됨) -->
                <form id="login-form" class="space-y-4">
                    <div class="flex items-center gap-4">
                        <label class="w-20 text-sm font-bold text-slate-700 shrink-0 text-left">아이디</label>
                        <input type="text" id="login-id" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium flex-1" placeholder="아이디를 입력하세요">
                    </div>
                    <div class="flex items-center gap-4">
                        <label class="w-20 text-sm font-bold text-slate-700 shrink-0 text-left">비밀번호</label>
                        <input type="password" id="login-pw" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium flex-1" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg mt-2">
                        로그인
                    </button>
                    <p class="text-center text-sm text-slate-500 mt-6 font-medium">
                        계정이 없으신가요? <a href="#" onclick="toggleAuthMode(true)" class="text-blue-600 font-black hover:underline cursor-pointer">회원가입</a>
                    </p>
                </form>

                <!-- 회원가입 폼 -->
                <form id="register-form" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">이름</label>
                            <input type="text" id="reg-name" required maxlength="3" class="input-field" placeholder="3자 이내">
                        </div>
                        <div>
                            <label class="label-text">생년월일</label>
                            <input type="text" id="reg-birth" required maxlength="10" class="input-field" placeholder="1990-01-01" oninput="autoHyphenDate(this)">
                        </div>
                    </div>
                    
                    <div>
                        <label class="label-text">휴대폰 번호</label>
                        <input type="tel" id="reg-phone" required maxlength="13" class="input-field" placeholder="010-0000-0000" oninput="autoHyphenPhone(this)">
                    </div>

                    <div>
                        <label class="label-text">입사일</label>
                        <input type="text" id="reg-join" required maxlength="10" class="input-field" placeholder="2024-01-01" oninput="autoHyphenDate(this)">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">아이디 (ID)</label>
                            <input type="text" id="reg-id" required class="input-field" placeholder="사용할 ID">
                        </div>
                        <div>
                            <label class="label-text">비밀번호</label>
                            <input type="password" id="reg-pw" required class="input-field" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black hover:bg-emerald-700 transition-all shadow-lg mt-2">
                        가입 완료
                    </button>
                    <p class="text-center text-sm text-slate-500 mt-6 font-medium">
                        이미 계정이 있나요? <a href="#" onclick="toggleAuthMode(false)" class="text-blue-600 font-black hover:underline cursor-pointer">로그인</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- 메인 섹션 -->
        <div id="main-section" class="hidden">
            <nav class="flex justify-between items-center mb-8 glass-morphism p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg">
                        <i class="fas fa-calendar-check text-lg"></i>
                    </div>
                    <span class="text-2xl font-black text-slate-800 tracking-tighter">서울더리본치과</span>
                    <span id="user-badge" class="ml-2 px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black rounded-full uppercase border border-blue-200">USER</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="welcome-msg" class="text-slate-700 font-bold hidden md:block"></span>
                    <button onclick="logout()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </button>
                </div>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 통계 및 연차 신청 (좌측 1단) -->
                <div class="space-y-6">
                    <div class="glass-morphism p-8 rounded-3xl shadow-sm border border-white border-l-8 border-l-blue-500">
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">잔여 연차</p>
                        <div class="flex items-baseline gap-2 mt-2">
                            <h2 id="remaining-leave" class="text-5xl font-black text-slate-800">0</h2>
                            <span class="text-slate-400 font-bold text-lg">/ <span id="total-leave">15</span>일</span>
                        </div>
                    </div>

                    <div id="user-request-card" class="glass-morphism p-6 rounded-3xl shadow-sm border border-white">
                        <h3 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                            <i class="fas fa-paper-plane text-blue-500"></i> 연차 신청
                        </h3>
                        <form id="leave-request-form" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="label-text">시작일</label>
                                    <input type="date" id="leave-start" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label class="label-text">종료일</label>
                                    <input type="date" id="leave-end" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                            
                            <!-- 유형 선택 -->
                            <div>
                                <label class="label-text">유형</label>
                                <select id="leave-type" onchange="handleLeaveTypeChange()" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="연차">일반 연차</option>
                                    <option value="반차">반차 (0.5일)</option>
                                    <option value="시간차">시간차 (1~7시간)</option>
                                    <option value="병가">병가 (차감없음)</option>
                                    <option value="경조사">경조사 (차감없음)</option>
                                </select>
                            </div>

                            <!-- 시간차 선택 시 동적으로 나타나는 UI -->
                            <div id="hourly-container" class="hidden animate-in slide-in-from-top-2 duration-300">
                                <label class="label-text">사용 시간</label>
                                <select id="leave-hours" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="1">1시간 (0.125일)</option>
                                    <option value="2">2시간 (0.25일)</option>
                                    <option value="3">3시간 (0.375일)</option>
                                    <option value="4">4시간 (0.5일)</option>
                                    <option value="5">5시간 (0.625일)</option>
                                    <option value="6">6시간 (0.75일)</option>
                                    <option value="7">7시간 (0.875일)</option>
                                </select>
                            </div>

                            <button type="submit" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black hover:bg-black transition-all shadow-xl mt-2">
                                신청하기
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 내역 및 관리 (우측 2단) -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- 일반 사원용: 본인 연차 내역 -->
                    <div id="user-history" class="glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                            <h3 class="text-lg font-black text-slate-800">내 연차 내역</h3>
                            <button onclick="refreshData(true)" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black hover:bg-blue-100 transition-all">
                                <i class="fas fa-sync-alt mr-1"></i> 새로고침
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-slate-50/80">
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">기간</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">유형</th>
                                        <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">상태</th>
                                    </tr>
                                </thead>
                                <tbody id="history-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 관리자 전용: 전체 관리 데스크 -->
                    <div id="admin-panel" class="hidden glass-morphism rounded-3xl shadow-sm border border-white overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-white/50 flex justify-between items-center">
                            <h3 class="text-lg font-black text-slate-800">
                                <i class="fas fa-users-cog text-blue-600 mr-2"></i>전체 연차 관리 데스크
                            </h3>
                            <button onclick="refreshData(true)" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black hover:bg-blue-100 transition-all">
                                <i class="fas fa-sync-alt mr-1"></i> 데이터 갱신
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-slate-50/80">
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">신청자</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">기간</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">구분</th>
                                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">상태</th>
                                        <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">관리 액션</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-queue-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4RU4q3Jc9XStADnW7FYwBw5t1R4R6lAbG2_sRttI7VcBD9vaGFEH1DC0Rj8MMIq0F6g/exec"; 

        let state = { currentUser: null, requests: [] };

        // --- 유틸리티 ---
        function autoHyphenPhone(target) {
            target.value = target.value.replace(/[^0-9]/g, '').replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3").replace(/\-{1,2}$/g, "");
        }

        function autoHyphenDate(target) {
            target.value = target.value.replace(/[^0-9]/g, '').replace(/^(\d{0,4})(\d{0,2})(\d{0,2})$/g, "$1-$2-$3").replace(/\-{1,2}$/g, "");
        }

        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function showAlert(msg, type = 'info') {
            const container = document.getElementById('alert-container');
            const div = document.createElement('div');
            const colors = { info: 'bg-blue-600', success: 'bg-emerald-600', error: 'bg-red-600' };
            div.className = `${colors[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-in font-bold text-sm`;
            div.innerHTML = `<span>${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        // --- 연차 유형 선택 (반차/시간차 UI 동기화) ---
        function handleLeaveTypeChange() {
            const type = document.getElementById('leave-type').value;
            const hourlyContainer = document.getElementById('hourly-container');
            const endInput = document.getElementById('leave-end');
            const startInput = document.getElementById('leave-start');

            if (type === '시간차') {
                hourlyContainer.classList.remove('hidden');
                endInput.value = startInput.value; 
                endInput.readOnly = true;
                endInput.classList.add('bg-slate-100', 'text-slate-400');
            } else if (type === '반차') {
                hourlyContainer.classList.add('hidden');
                endInput.value = startInput.value; 
                endInput.readOnly = true;
                endInput.classList.add('bg-slate-100', 'text-slate-400');
            } else {
                hourlyContainer.classList.add('hidden');
                endInput.readOnly = false;
                endInput.classList.remove('bg-slate-100', 'text-slate-400');
            }
        }

        // 시작일 변경 시 반차/시간차면 종료일도 같이 변경되게 처리
        document.getElementById('leave-start').addEventListener('change', function() {
            const type = document.getElementById('leave-type').value;
            if (type === '반차' || type === '시간차') {
                document.getElementById('leave-end').value = this.value;
            }
        });

        // --- 모달 관리 ---
        function showSuccessModal() { document.getElementById('success-modal').classList.remove('hidden'); }
        function closeSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
            toggleAuthMode(false); 
        }

        let deleteTargetId = null;
        function openConfirmModal(id) {
            deleteTargetId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function closeConfirmModal() {
            deleteTargetId = null;
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        // 삭제 처리 실행
        document.getElementById('confirm-delete-btn').onclick = async () => {
            if (!deleteTargetId) return;
            closeConfirmModal();
            const res = await apiCall('deleteRequest', { requestId: deleteTargetId }, true);
            if (res) { 
                showAlert('성공적으로 삭제되었습니다.', 'success'); 
                refreshData(true); 
            }
        };

        function toggleLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
        function toggleAuthMode(isRegister) {
            document.getElementById('login-form').classList.toggle('hidden', isRegister);
            document.getElementById('register-form').classList.toggle('hidden', !isRegister);
        }

        // --- API 호출 ---
        async function apiCall(action, data = {}, showLoader = true) {
            if (showLoader) toggleLoading(true);
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...data })
                });

                if (!response.ok) throw new Error(`HTTP 에러: ${response.status}`);
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                return result;
            } catch (err) {
                console.error("통신 오류 상세:", err);
                let errorMsg = err.message;
                if (err.message === 'Failed to fetch') {
                    errorMsg = "서버 응답 없음 (CORS/배포 권한 확인 필요).";
                }
                if (showLoader) showAlert(`서버 오류: ${errorMsg}`, 'error');
                return null;
            } finally { 
                if (showLoader) toggleLoading(false); 
            }
        }

        // --- 세션 체크 (F5 즉시 반영) ---
        (function checkSessionAndInit() {
            const savedDataStr = sessionStorage.getItem('leavepass_user');
            let user = null; let requests = [];

            if (savedDataStr) {
                try {
                    const parsed = JSON.parse(savedDataStr);
                    if (parsed.user) { user = parsed.user; requests = parsed.requests || []; } 
                    else { user = parsed; }
                } catch(e) {}
            }

            if (user) {
                loginSuccess(user, requests, false);
                apiCall('fetchData', { id: user.id, role: user.role }, false).then(res => {
                    if (res && res.user) {
                        state.currentUser = res.user;
                        state.requests = res.requests;
                        sessionStorage.setItem('leavepass_user', JSON.stringify({user: res.user, requests: res.requests}));
                        
                        const cachedStr = localStorage.getItem('leavepass_cache');
                        if (cachedStr) {
                            const cached = JSON.parse(cachedStr);
                            localStorage.setItem('leavepass_cache', JSON.stringify({...cached, user: res.user, requests: res.requests}));
                        }
                        renderDashboard();
                    } 
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        })();

        // --- 폼 이벤트 ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            
            const cachedData = localStorage.getItem('leavepass_cache');
            if (cachedData) {
                const cached = JSON.parse(cachedData);
                if (cached.id === id && cached.pw === pw) {
                    loginSuccess(cached.user, cached.requests, true);
                    apiCall('fetchData', { id: cached.user.id, role: cached.user.role }, false).then(res => {
                        if (res && res.user) {
                            state.currentUser = res.user; state.requests = res.requests;
                            sessionStorage.setItem('leavepass_user', JSON.stringify({user: res.user, requests: res.requests}));
                            localStorage.setItem('leavepass_cache', JSON.stringify({ id, pw, user: res.user, requests: res.requests }));
                            renderDashboard();
                        }
                    });
                    return; 
                }
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>인증 중...';
            btn.disabled = true; btn.classList.add('opacity-80', 'cursor-wait');

            const res = await apiCall('login', { id, pw }, false); 
            
            btn.innerHTML = originalText; btn.disabled = false; btn.classList.remove('opacity-80', 'cursor-wait');

            if (res && res.user) {
                localStorage.setItem('leavepass_cache', JSON.stringify({ id, pw, user: res.user, requests: res.requests }));
                loginSuccess(res.user, res.requests, true);
            }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>가입 중...';
            btn.disabled = true;

            const res = await apiCall('register', {
                name: document.getElementById('reg-name').value,
                birth: document.getElementById('reg-birth').value,
                phone: document.getElementById('reg-phone').value,
                joinDate: document.getElementById('reg-join').value,
                id: document.getElementById('reg-id').value,
                pw: document.getElementById('reg-pw').value,
                role: 'user'
            }, false);

            btn.innerHTML = originalText; btn.disabled = false;
            if (res) showSuccessModal(); 
        };

        function loginSuccess(user, requests = [], showWelcomeMsg = true) {
            state.currentUser = user; state.requests = requests;
            sessionStorage.setItem('leavepass_user', JSON.stringify({user, requests}));

            document.getElementById('auth-section').classList.add('hidden');
            const mainSec = document.getElementById('main-section');
            mainSec.classList.remove('hidden');

            if (showWelcomeMsg) {
                mainSec.classList.add('animate-in', 'fade-in', 'duration-500');
                showAlert(`${user.name}님 환영합니다!`, 'success');
            } else {
                mainSec.classList.remove('animate-in', 'fade-in', 'duration-500');
            }

            document.getElementById('welcome-msg').innerText = `${user.name} 님`;
            document.getElementById('user-badge').innerText = user.role.toUpperCase();
            
            const isAdmin = user.role === 'admin';
            
            if(isAdmin) {
                document.getElementById('user-history').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('user-history').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
            
            renderDashboard();
        }

        document.getElementById('leave-request-form').onsubmit = async (e) => {
            e.preventDefault();
            const start = document.getElementById('leave-start').value;
            const end = document.getElementById('leave-end').value;
            if (new Date(start) > new Date(end)) return showAlert('기간을 확인하세요.', 'error');
            
            let leaveType = document.getElementById('leave-type').value;
            if (leaveType === '시간차') {
                const hours = document.getElementById('leave-hours').value;
                leaveType = `시간차 (${hours}시간)`;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>처리 중...';
            btn.disabled = true;

            const res = await apiCall('requestLeave', {
                userId: state.currentUser.id, userName: state.currentUser.name,
                start, end, type: leaveType
            }, false);

            btn.innerHTML = originalText; btn.disabled = false;
            if (res) { 
                showAlert('신청이 완료되었습니다.', 'success'); 
                document.getElementById('leave-request-form').reset(); 
                handleLeaveTypeChange(); // UI 초기화
                refreshData(false); 
            }
        };

        async function refreshData(showLoader = true) {
            if (!state.currentUser) return;
            const res = await apiCall('fetchData', { id: state.currentUser.id, role: state.currentUser.role }, showLoader);
            if (res) { 
                state.currentUser = res.user; state.requests = res.requests;
                sessionStorage.setItem('leavepass_user', JSON.stringify({user: res.user, requests: res.requests}));
                renderDashboard(); 
            }
        }

        async function updateStatus(reqId, status) {
            const res = await apiCall('updateStatus', { requestId: reqId, status });
            if (res) { showAlert(`상태가 '${status}'(으)로 변경되었습니다.`); refreshData(true); }
        }

        function renderDashboard() {
            const u = state.currentUser;
            if(!u) return;
            document.getElementById('total-leave').innerText = u.total;
            document.getElementById('remaining-leave').innerText = (u.total - (u.used || 0)).toFixed(1);
            
            if (u.role === 'user') {
                const hist = document.getElementById('history-body'); 
                hist.innerHTML = '';
                
                let myRequests = state.requests.filter(r => r.userId === u.id);
                if (myRequests.length === 0) {
                    hist.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-300 font-bold">내역이 없습니다.</td></tr>';
                } else {
                    myRequests.forEach(req => {
                        const color = req.status === '승인' ? 'bg-emerald-100 text-emerald-600' : (req.status === '반려' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600');
                        hist.innerHTML += `<tr class="hover:bg-slate-50 transition-all font-medium"><td class="p-5 text-slate-700 text-[13px] tracking-tight">${formatDate(req.start)} ~ ${formatDate(req.end)}</td><td class="p-5 text-xs font-black text-slate-400">${req.type}</td><td class="p-5 text-right"><span class="px-3 py-1.5 rounded-full text-[10px] font-black ${color}">${req.status}</span></td></tr>`;
                    });
                }
            }
            
            if (u.role === 'admin') {
                const adminBody = document.getElementById('admin-queue-body'); 
                adminBody.innerHTML = '';
                
                if (state.requests.length === 0) {
                    adminBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-300 font-bold">등록된 연차 신청이 없습니다.</td></tr>';
                } else {
                    state.requests.forEach(req => {
                        const fStart = formatDate(req.start);
                        const fEnd = formatDate(req.end);
                        const isPending = req.status === '대기';
                        const color = req.status === '승인' ? 'bg-emerald-100 text-emerald-600' : (req.status === '반려' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600');

                        let actionBtns = '';
                        if (isPending) {
                            actionBtns = `
                                <button onclick="updateStatus('${req.id}', '승인')" class="px-3 py-1.5 bg-emerald-500 text-white rounded-lg font-black text-[11px] shadow-sm hover:bg-emerald-600 transition-all">승인</button>
                                <button onclick="updateStatus('${req.id}', '반려')" class="px-3 py-1.5 bg-rose-500 text-white rounded-lg font-black text-[11px] shadow-sm hover:bg-rose-600 transition-all">반려</button>
                                <button onclick="openConfirmModal('${req.id}')" class="px-3 py-1.5 bg-slate-400 text-white rounded-lg font-black text-[11px] shadow-sm hover:bg-slate-600 transition-all"><i class="fas fa-trash"></i></button>
                            `;
                        } else {
                            actionBtns = `
                                <button onclick="updateStatus('${req.id}', '대기')" class="px-3 py-1.5 bg-amber-400 text-white rounded-lg font-black text-[11px] shadow-sm hover:bg-amber-500 transition-all">대기로 수정</button>
                                <button onclick="openConfirmModal('${req.id}')" class="px-3 py-1.5 bg-slate-400 text-white rounded-lg font-black text-[11px] shadow-sm hover:bg-slate-600 transition-all"><i class="fas fa-trash"></i></button>
                            `;
                        }

                        adminBody.innerHTML += `
                            <tr class="hover:bg-slate-50 transition-all font-medium border-b border-slate-50">
                                <td class="p-4">
                                    <div class="font-black text-slate-800">${req.userName}</div>
                                    <div class="text-[10px] text-slate-400 font-bold">${req.userId}</div>
                                </td>
                                <td class="p-4 text-slate-600 text-[12px] tracking-tight">${fStart} ~ <br class="md:hidden">${fEnd}</td>
                                <td class="p-4 text-xs font-black text-blue-500 bg-blue-50/50 rounded-lg text-center">${req.type}</td>
                                <td class="p-4">
                                    <span class="px-2 py-1 rounded-md text-[10px] font-black ${color}">${req.status}</span>
                                </td>
                                <td class="p-4 text-right">
                                    <div class="flex justify-end gap-1.5 flex-wrap">
                                        ${actionBtns}
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
            }
        }

        function logout() { 
            sessionStorage.removeItem('leavepass_user');
            localStorage.removeItem('leavepass_cache'); 
            location.reload(); 
        }
    </script>
</body>
</html>
